name: Dip Alert Pipeline v3.1

on:
  schedule:
    # 02:30 UTC = 08:00 IST — AMFI has finished publishing previous day NAVs
    - cron: "30 2 * * 1-5"   # Monday–Friday only; no NAVs on weekends
  workflow_dispatch:           # Allow manual trigger from Actions tab

jobs:
  run-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (includes persisted state files)
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Dip Alert Pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python dip_alert.py

      - name: Commit updated state files back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signal_log.csv nav_processed.txt watermarks.db
          git diff --cached --quiet || git commit -m "chore: state update $(date -u '+%Y-%m-%d')"
          git push
