name: Mutual Fund Dip Alert

on:
  workflow_dispatch:
    inputs:
      final_check:
        description: 'Is this the final check of the day?'
        required: false
        default: 'false'

# ── Grant write access to commit state files back to repo ──
permissions:
  contents: write

jobs:
  run-alert:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run dip alert
        env:
          EMAIL_ENABLED:      ${{ secrets.EMAIL_ENABLED }}
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:    ${{ secrets.EMAIL_RECIPIENT }}
          TELEGRAM_ENABLED:   ${{ secrets.TELEGRAM_ENABLED }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          FINAL_CHECK:        ${{ github.event.inputs.final_check }}
        run: python dip_alert.py

      - name: Commit state files
        if: always()
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          touch last_nav_date.txt nav_processed.txt signal_log.csv prev_drawdown.csv alert_cooldown.csv
          git add last_nav_date.txt nav_processed.txt signal_log.csv prev_drawdown.csv alert_cooldown.csv
          git diff --cached --quiet || git commit -m "chore: update alert state [skip ci]"
          git push || true
