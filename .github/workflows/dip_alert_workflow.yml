name: Mutual Fund Dip Alert

on:
  schedule:
    # Every 1 hour from 6:00 PM to 11:00 PM IST (Mon–Fri)
    # 6:00 PM IST = 12:30 UTC
    - cron: "30 12-17 * * 1-5"   # 6:00, 7:00, 8:00, 9:00, 10:00, 11:00 PM IST

    # Every 1 hour from 12:00 AM to 6:00 AM IST (overnight)
    - cron: "30 18-23 * * 1-5"   # 12:00, 1:00, 2:00, 3:00, 4:00, 5:00 AM IST
    - cron: "30 0 * * 2-6"       # 6:00 AM IST final check

  workflow_dispatch:
    inputs:
      final_check:
        description: 'Is this the final check of the day?'
        required: false
        default: 'false'

# ── Grant write access to commit state files back to repo ──
permissions:
  contents: write

jobs:
  run-alert:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run dip alert
        env:
          EMAIL_ENABLED:         ${{ secrets.EMAIL_ENABLED }}
          EMAIL_SENDER:          ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:        ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:       ${{ secrets.EMAIL_RECIPIENT }}
          TELEGRAM_ENABLED:      ${{ secrets.TELEGRAM_ENABLED }}
          TELEGRAM_BOT_TOKEN_MO: ${{ secrets.TELEGRAM_BOT_TOKEN_MO }}
          TELEGRAM_CHAT_ID_MO:   ${{ secrets.TELEGRAM_CHAT_ID_MO }}
          TELEGRAM_BOT_TOKEN_PP: ${{ secrets.TELEGRAM_BOT_TOKEN_PP }}
          TELEGRAM_CHAT_ID_PP:   ${{ secrets.TELEGRAM_CHAT_ID_PP }}
          FINAL_CHECK: ${{ (github.event.schedule == '30 0 * * 2-6') && 'true' || github.event.inputs.final_check || 'false' }}
        run: python dip_alert.py

      - name: Commit state files
        if: always()
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          touch last_nav_date.txt nav_processed.txt signal_log.csv prev_drawdown.csv alert_cooldown.csv prev_signal.csv
          git add last_nav_date.txt nav_processed.txt signal_log.csv prev_drawdown.csv alert_cooldown.csv prev_signal.csv
          git diff --cached --quiet || git commit -m "chore: update alert state [skip ci]"
          git push || true
