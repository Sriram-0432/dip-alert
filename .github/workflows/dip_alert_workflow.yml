name: Mutual Fund Dip Alert

on:
  schedule:
    # ── Peak window: every 30 mins, 6:00 PM – 11:30 PM IST ──
    # 6:00 PM IST = 12:30 UTC  |  11:30 PM IST = 18:00 UTC
    - cron: "30 12-17 * * 1-5"   # :30 past → 6:00, 6:30 ... 11:00 PM IST
    - cron: "0 13-18 * * 1-5"    # :00 past → 6:30, 7:00 ... 11:30 PM IST

    # ── Overnight window: every 2 hrs, 1:30 AM – 5:30 AM IST ──
    # 1:30 AM IST = 20:00 UTC  |  5:30 AM IST = 00:00 UTC
    - cron: "0 20,22,0 * * 2-6"  # 1:30 AM, 3:30 AM, 5:30 AM IST

    # ── Final check: 7:30 AM IST = 02:00 UTC ──
    # Sends missed NAV alert if NAV still not updated overnight
    - cron: "0 2 * * 2-6"

  workflow_dispatch:

jobs:
  run-alert:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run dip alert
        env:
          EMAIL_ENABLED:      ${{ secrets.EMAIL_ENABLED }}
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:    ${{ secrets.EMAIL_RECIPIENT }}
          TELEGRAM_ENABLED:   ${{ secrets.TELEGRAM_ENABLED }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          FINAL_CHECK: ${{ (github.event.schedule == '0 2 * * 2-6') && 'true' || 'false' }}
        run: python dip_alert.py

      - name: Commit state files
        if: always()
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add last_nav_date.txt nav_processed.txt signal_log.csv prev_drawdown.csv alert_cooldown.csv || true
          git diff --cached --quiet || git commit -m "chore: update alert state [skip ci]"
          git push || true
